<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Web Time Analytics</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="content">
    <div class="pages-container show-detail">
      <!-- General View Half-Page -->
      <div class="half-page" id="general-page">
        <div class="page-header">
          <div class="header-content">
            <div class="header-text">All Sites</div>
            <div class="time-summary">Overview</div>
          </div>
          <button id="forward-btn" class="nav-btn">→</button>
        </div>
        <div class="page-content">
          <canvas id="total-time-chart"></canvas>
          <div id="daily-breakdown" class="daily-breakdown">
            <div class="breakdown-title">Hover over a day to see breakdown</div>
            <div class="breakdown-bars"></div>
          </div>
        </div>
      </div>
      
      <!-- Detail View Half-Page -->
      <div class="half-page" id="detail-page">
        <div class="page-header">
          <button id="back-btn" class="nav-btn">←</button>
          <div class="header-content">
            <div class="header-text">WebTime</div>
            <div class="time-summary">0:00 / 0:00</div>
          </div>
          <button id="settings-btn" class="nav-btn">⚙️</button>
        </div>
        <div class="page-content">
          <canvas id="time-chart"></canvas>
        </div>
      </div>
      
      <!-- Settings View Half-Page -->
      <div class="half-page" id="settings-page">
        <div class="page-header">
          <button id="settings-back-btn" class="nav-btn">←</button>
          <div class="header-content">
            <div class="header-text">Settings</div>
            <div class="time-summary" id="settings-domain"></div>
          </div>
        </div>
        <div class="page-content">
          <div class="settings-container">
            <div class="settings-section">
              <label>Day resets at:</label>
              <select id="day-reset-time">
                <option value="0">Midnight</option>
                <option value="1">1:00 AM</option>
                <option value="2">2:00 AM</option>
                <option value="3">3:00 AM</option>
                <option value="4">4:00 AM</option>
              </select>
              
              <label>Custom message:</label>
              <input type="text" id="custom-message" placeholder="Was this time mindful?">
            </div>
            
            <div class="settings-section">
              <label>Daily limit for <span id="settings-domain-inline"></span>:</label>
              <div class="time-limit-inputs">
                <input type="number" id="daily-limit-hours" min="0" max="23" placeholder="0">
                <span>h</span>
                <input type="number" id="daily-limit-minutes" min="0" max="59" placeholder="0">
                <span>min</span>
              </div>
              
              <label>After limit, nudge every:</label>
              <div class="time-limit-inputs">
                <input type="number" id="flash-interval" min="1" placeholder="">
                <span>min</span>
                <span style="margin-left: auto;">for:</span>
                <input type="number" id="grace-period" min="1" placeholder="">
                <span>min</span>
              </div>
              
              <label>After nudges, display reminder every:</label>
              <div class="time-limit-inputs">
                <input type="number" id="popup-interval" min="1" placeholder="">
                <span>min</span>
              </div>
              
              <div class="time-limit-helper">Leave empty to disable</div>
            </div>
            
            <button id="save-settings-btn" class="save-btn">Save Changes</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="../shared/constants.js"></script>
  <script src="../shared/utils.js"></script>
  <script src="chart.min.js"></script>
  <script src="config.js"></script>
  <script src="state.js"></script>
  <script src="popup-utils.js"></script>
  <script src="data-processor.js"></script>
  <script src="chart-builder.js"></script>
  <script src="ui-manager.js"></script>
  <script src="popup-init.js"></script>
</body>
</html>
