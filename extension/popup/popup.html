<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Web Time Analytics</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="content">
    <div class="pages-container show-detail">
      <!-- General View Page -->
      <div class="half-page" id="general-page">
        <div class="page-header">
          <div class="header-row-buttons">
            <button id="general-detail-btn" class="nav-btn-text">This Site  ▶</button>
            <div class="time-summary">Overview</div>
            <div style="width: 80px;"></div>
          </div>
          <div class="header-row-context">
            <div class="header-text">All Sites</div>
          </div>
        </div>
        <div class="page-content split-view">
          <div class="left-panel">
            <canvas id="total-time-chart"></canvas>
          </div>
          <div class="right-panel">
            <div class="breakdown-title">Hover over a day to see breakdown</div>
            <div class="pie-chart-wrapper">
              <canvas id="breakdown-pie-chart"></canvas>
            </div>
            <div class="breakdown-bars"></div>
          </div>
        </div>
      </div>

      <!-- Detail View Page -->
      <div class="half-page" id="detail-page">
        <div class="page-header">
          <div class="header-row-buttons">
            <button id="detail-general-btn" class="nav-btn-text">◀ All Sites</button>
            <div class="time-summary">0:00 / 0:00</div>
            <div style="width: 80px;"></div>
          </div>
          <div class="header-row-context">
            <div class="header-text">WebTime</div>
          </div>
        </div>
        <div class="page-content split-view">
          <div class="left-panel">
            <canvas id="time-chart"></canvas>
          </div>
          <div class="right-panel">
            <div class="settings-panel">
              <div class="settings-content">
                <div class="settings-row">
                  <label>Day resets</label>
                  <select id="day-reset-time">
                    <option value="0">Midnight</option>
                    <option value="1">1:00 AM</option>
                    <option value="2">2:00 AM</option>
                    <option value="3">3:00 AM</option>
                    <option value="4">4:00 AM</option>
                    <option value="5">5:00 AM</option>
                    <option value="6">6:00 AM</option>
                  </select>
                </div>
                <div class="settings-grid">
                  <div class="settings-row">
                    <label>Inactivity (s)</label>
                    <input type="number" id="inactivity-timeout" value="30" min="1">
                  </div>
                  <div class="settings-row">
                    <label>Chart scale</label>
                    <input type="number" id="chart-scaling" value="0.8" min="0.3" max="1.0" step="0.05">
                  </div>
                </div>
                <div class="settings-row">
                  <label>End session shortcut</label>
                  <div style="display: flex; gap: 4px; align-items: center;">
                    <input type="text" id="end-session-shortcut" value="Ctrl+E" readonly placeholder="Click to set" style="flex: 1; cursor: pointer;">
                    <button type="button" id="end-session-shortcut-clear" title="Disable shortcut" style="padding: 2px 6px;">×</button>
                  </div>
                </div>
                <div class="divider"></div>
                <div class="interventions-header">
                  Interventions: <span class="domain" id="settings-domain-inline"></span>
                </div>
                <div class="intervention-row">
                  <input type="checkbox" id="session-limit-enabled">
                  <div class="intervention-grid">
                    <div class="intervention-group">
                      <label>Session limit</label>
                      <div class="time-inputs">
                        <input type="number" id="session-limit-minutes" min="1" value="30">
                        <span>min</span>
                      </div>
                    </div>
                    <div class="intervention-group">
                      <label>Cooldown +<span id="cooldown-recommended" style="color: #888; font-size: 11px;"></span></label>
                      <div class="time-inputs">
                        <input type="number" id="cooldown-increment-minutes" min="1" value="10">
                        <span>min</span>
                      </div>
                    </div>
                    <div class="intervention-group">
                      <label>Nudges<span id="nudge-count-auto" style="color: #888; font-size: 11px;"></span></label>
                      <div class="time-inputs">
                        <input type="number" id="nudge-count" min="0" max="20">
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="settings-footer">
                <button class="save-btn" id="save-settings-btn">Save</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="chart.min.js"></script>
  <script src="../dist/popup/popup-bundle.js"></script>
</body>
</html>
