<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Web Time Analytics</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="content">
    <div class="pages-container show-detail">
      <!-- General View Page -->
      <div class="half-page" id="general-page">
        <div class="page-header">
          <div class="header-row-buttons">
            <button id="general-detail-btn" class="nav-btn-text">This Site  ▶</button>
            <div class="time-summary">Overview</div>
            <div style="width: 80px;"></div>
          </div>
          <div class="header-row-context">
            <div class="header-text">All Sites</div>
          </div>
        </div>
        <div class="page-content split-view">
          <div class="left-panel">
            <canvas id="total-time-chart"></canvas>
          </div>
          <div class="right-panel">
            <div class="breakdown-title">Hover over a day to see breakdown</div>
            <div class="pie-chart-wrapper">
              <canvas id="breakdown-pie-chart"></canvas>
            </div>
            <div class="breakdown-bars"></div>
          </div>
        </div>
      </div>

      <!-- Detail View Page -->
      <div class="half-page" id="detail-page">
        <div class="page-header">
          <div class="header-row-buttons">
            <button id="detail-general-btn" class="nav-btn-text">◀ All Sites</button>
            <div class="time-summary">0:00 / 0:00</div>
            <div style="width: 80px;"></div>
          </div>
          <div class="header-row-context">
            <div class="header-text">WebTime</div>
          </div>
        </div>
        <div class="page-content split-view">
          <div class="left-panel">
            <canvas id="time-chart"></canvas>
          </div>
          <div class="right-panel">
            <div class="settings-panel">
              <div class="settings-content">
                <div class="settings-row">
                  <label>Day resets</label>
                  <select id="day-reset-time">
                    <option value="0">Midnight</option>
                    <option value="1">1:00 AM</option>
                    <option value="2">2:00 AM</option>
                    <option value="3">3:00 AM</option>
                    <option value="4">4:00 AM</option>
                    <option value="5">5:00 AM</option>
                    <option value="6">6:00 AM</option>
                  </select>
                </div>
                <div class="settings-row">
                  <label>Reminder message</label>
                  <input type="text" id="custom-message" placeholder="Was this time mindful?">
                </div>
                <div class="settings-grid">
                  <div class="settings-row">
                    <label>Inactivity timeout (s)</label>
                    <input type="number" id="inactivity-timeout" value="30" min="1">
                  </div>
                  <div class="settings-row">
                    <label>Popup duration (s)</label>
                    <input type="number" id="popup-duration" value="10" min="1">
                  </div>
                </div>
                <div class="divider"></div>
                <div class="interventions-header">
                  Interventions: <span class="domain" id="settings-domain-inline"></span>
                </div>
                <div class="intervention-row">
                  <input type="checkbox" id="reminder-enabled">
                  <div class="intervention-grid">
                    <div class="intervention-group">
                      <label>After</label>
                      <div class="time-inputs">
                        <input type="number" id="reminder-hours" min="0" max="23" placeholder="3">
                        <span>h</span>
                        <input type="number" id="reminder-minutes" min="0" placeholder="0">
                        <span>m</span>
                      </div>
                    </div>
                    <div class="intervention-group">
                      <label>Every</label>
                      <div class="time-inputs">
                        <input type="number" id="reminder-interval" min="1" placeholder="15">
                        <span>m</span>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="nudges-row" id="nudge-count-option" style="display: none;">
                  <label>Smart nudges</label>
                  <div class="nudges-input">
                    <input type="number" id="nudge-count" min="0" max="15" placeholder="6">
                    <span id="nudge-recommendation">(recommended: 6)</span>
                  </div>
                </div>
                <div class="info-hint">
                  Nudges get more frequent as time limit approaches
                </div>
              </div>
              <div class="settings-footer">
                <button class="save-btn" id="save-settings-btn">Save</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="chart.min.js"></script>
  <script src="../dist/popup/popup-bundle.js"></script>
</body>
</html>
