<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Web Time</h1>
    </header>
    
    <div class="today-stats">
      <h2>Today</h2>
      <div id="today-time" class="time-display">00:00:00</div>
    </div>
    
    <div class="tabs">
      <button class="tab-btn active" data-period="week">Week</button>
      <button class="tab-btn" data-period="2week">2 Weeks</button>
      <button class="tab-btn" data-period="month">Month</button>
    </div>
    
    <div class="chart-container">
      <canvas id="timeChart"></canvas>
    </div>
    
    <div class="stats-summary">
      <div class="stat-card">
        <h3>Daily Average</h3>
        <div id="avg-time" class="time-display">00:00:00</div>
      </div>
      <div class="stat-card">
        <h3>Most Active Day</h3>
        <div id="max-day">-</div>
        <div id="max-time" class="time-display">00:00:00</div>
      </div>
    </div>
  </div>
  
  <script src="chart.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
