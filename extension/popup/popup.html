<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Web Time Analytics</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="content">
    <div class="pages-container show-detail">
      <!-- General View Half-Page -->
      <div class="half-page" id="general-page">
        <div class="page-header">
          <div class="header-row-buttons">
            <button id="general-detail-btn" class="nav-btn-text">→ This Site</button>
            <div class="time-summary">Overview</div>
            <div style="width: 80px;"></div>
          </div>
          <div class="header-row-context">
            <div class="header-text">All Sites</div>
          </div>
        </div>
        <div class="page-content">
          <canvas id="total-time-chart"></canvas>
          <div id="daily-breakdown" class="daily-breakdown">
            <div class="breakdown-title">Hover over a day to see breakdown</div>
            <div class="breakdown-bars"></div>
          </div>
        </div>
      </div>
      
      <!-- Detail View Half-Page -->
      <div class="half-page" id="detail-page">
        <div class="page-header">
          <div class="header-row-buttons">
            <button id="detail-general-btn" class="nav-btn-text">← All Sites</button>
            <div class="time-summary">0:00 / 0:00</div>
            <button id="detail-settings-btn" class="nav-btn-text">Settings ⚙️</button>
          </div>
          <div class="header-row-context">
            <div class="header-text">WebTime</div>
          </div>
        </div>
        <div class="page-content">
          <canvas id="time-chart"></canvas>
        </div>
      </div>
      
      <!-- Settings View Half-Page -->
      <div class="half-page" id="settings-page">
        <div class="page-header">
          <div class="header-row-buttons">
            <button id="settings-back-btn" class="nav-btn-text">← Back</button>
            <div style="flex: 1;"></div>
            <div style="width: 80px;"></div>
          </div>
          <div class="header-row-context">
            <div class="header-text" id="settings-domain"></div>
          </div>
        </div>
        <div class="page-content">
          <div class="settings-container">
            <div class="settings-section">
              <label>Day resets at:</label>
              <select id="day-reset-time">
                <option value="0">Midnight</option>
                <option value="1">1:00 AM</option>
                <option value="2">2:00 AM</option>
                <option value="3">3:00 AM</option>
                <option value="4">4:00 AM</option>
              </select>
              
              <label>Reminders message:</label>
              <input type="text" id="custom-message" placeholder="Was this time mindful?">
            </div>
            
            <div class="settings-section">
              <label>Interventions for <span id="settings-domain-inline"></span>:</label>
              
              <div class="intervention-option">
                <input type="checkbox" id="nudge-enabled">
                <label for="nudge-enabled" class="intervention-label">
                  <span>After</span>
                  <input type="number" id="nudge-hours" min="0" max="23" placeholder="2" class="inline-input">
                  <span>h</span>
                  <input type="number" id="nudge-minutes" min="0" max="59" placeholder="30" class="inline-input">
                  <span>m, nudge every</span>
                  <input type="number" id="nudge-interval" min="1" placeholder="5" class="inline-input">
                  <span>m</span>
                </label>
              </div>
              
              <div class="intervention-option">
                <input type="checkbox" id="reminder-enabled">
                <label for="reminder-enabled" class="intervention-label">
                  <span>After</span>
                  <input type="number" id="reminder-hours" min="0" max="23" placeholder="3" class="inline-input">
                  <span>h</span>
                  <input type="number" id="reminder-minutes" min="0" max="59" placeholder="0" class="inline-input">
                  <span>m, remind every</span>
                  <input type="number" id="reminder-interval" min="1" placeholder="15" class="inline-input">
                  <span>m</span>
                </label>
              </div>
              
              <div class="intervention-helper">
                ℹ️ Reminders override nudges once they begin
              </div>
            </div>
            
            <button id="save-settings-btn" class="save-btn">Save Changes</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="../shared/constants.js"></script>
  <script src="../shared/utils.js"></script>
  <script src="chart.min.js"></script>
  <script src="config.js"></script>
  <script src="state.js"></script>
  <script src="popup-utils.js"></script>
  <script src="data-processor.js"></script>
  <script src="chart-builder.js"></script>
  <script src="ui-manager.js"></script>
  <script src="popup-init.js"></script>
</body>
</html>
